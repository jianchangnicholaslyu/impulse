<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>IMPULSE 游戏服务商城</title>
  <link rel="preconnect" href="https://cdnjs.cloudflare.com">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
  <link rel="stylesheet" href="styles.css">
  <script src="app.js" defer></script>
</head>
<body class="customer-mode">
  <header class="topbar">
    <button class="brand notranslate" id="brandButton" type="button" data-action="go-home" aria-label="返回首页" translate="no">
      <span class="brand-mark">I</span>
      <span>IMPULSE</span>
    </button>

    <form class="search" id="searchForm">
      <input id="searchInput" type="search" placeholder="搜索游戏、服务、账号" autocomplete="off">
      <button type="submit" aria-label="搜索">
        <i class="fa-solid fa-magnifying-glass" aria-hidden="true"></i>
        <span>搜索</span>
      </button>
    </form>

    <div class="top-actions" id="topActions"></div>
  </header>

  <main class="shell">
    <section class="hero-panel fade-in" id="heroPanel"></section>
    <nav class="breadcrumb" id="breadcrumb" aria-label="当前位置"></nav>
    <section class="content-zone" id="contentZone" aria-live="polite"></section>
  </main>

  <footer class="footer">
    <div class="footer-links">
      <a href="#/about">关于我们</a>
      <a href="#/terms">服务条款</a>
      <a href="#/privacy">隐私政策</a>
      <a href="#/help">帮助中心</a>
    </div>
    <p>Copyright © 2026 IMPULSE. All rights reserved.</p>
  </footer>

  <div class="modal-root" id="modalRoot"></div>
  <div class="context-menu hidden" id="contextMenu"></div>
  <div class="toast-root" id="toastRoot" aria-live="polite"></div>
</body>
</html>
