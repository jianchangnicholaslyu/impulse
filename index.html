<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>IMPULSE J - Driven by Gamers' Momentum</title>
  <link rel="preconnect" href="https://cdnjs.cloudflare.com">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
  <link rel="stylesheet" href="/src/styles/main.css">
  <script type="module" src="/src/main.js"></script>
  <script>
    if (window.location.protocol === "file:") {
      var legacyStyles = document.createElement("link");
      legacyStyles.rel = "stylesheet";
      legacyStyles.href = "styles.css";
      document.head.appendChild(legacyStyles);

      window.addEventListener("DOMContentLoaded", function () {
        var legacyScript = document.createElement("script");
        legacyScript.src = "app.js";
        document.body.appendChild(legacyScript);
      });
    }
  </script>
</head>
<body class="customer-mode app-loading">
  <div class="app-loader notranslate" id="appLoader" role="status" aria-live="polite" aria-label="Loading IMPULSE J" translate="no">
    <div class="app-loader-card">
      <div class="app-loader-icon" aria-hidden="true">
        <span>I</span>
      </div>
      <div class="app-loader-copy">
        <strong>Loading IMPULSE J</strong>
        <span>Preparing your marketplace</span>
      </div>
      <div class="app-loader-dots" aria-hidden="true">
        <span></span>
        <span></span>
        <span></span>
      </div>
    </div>
  </div>
  <noscript><style>.app-loader{display:none!important;}</style></noscript>

  <header class="topbar">
    <button class="brand notranslate" id="brandButton" type="button" data-action="go-home" aria-label="Back Home" translate="no">
      <span class="brand-mark">I</span>
      <span class="brand-wordmark" aria-label="IMPULSE J">
        <span class="brand-roman">IMPULSE</span>
        <span class="brand-script">J</span>
      </span>
    </button>

    <form class="search" id="searchForm">
      <input id="searchInput" type="search" placeholder="Search games, services, accounts" autocomplete="off">
      <button type="submit" aria-label="Search">
        <i class="fa-solid fa-magnifying-glass" aria-hidden="true"></i>
        <span>Search</span>
      </button>
    </form>

    <div class="top-actions" id="topActions"></div>
  </header>

  <main class="shell">
    <section class="hero-panel fade-in" id="heroPanel"></section>
    <nav class="breadcrumb" id="breadcrumb" aria-label="Current Location"></nav>
    <section class="content-zone" id="contentZone" aria-live="polite"></section>
  </main>

  <footer class="footer">
    <div class="footer-links">
      <a href="#/about">About Us</a>
      <a href="#/terms">Terms of Service</a>
      <a href="#/privacy">Privacy Policy</a>
      <a href="#/refund">Refund Policy</a>
      <a href="#/payment">Payment Rules</a>
      <a href="#/points">Points Rules</a>
      <a href="#/dispute">Dispute Rules</a>
      <a href="#/withdrawal">Withdrawal Rules</a>
      <a href="#/help">Help Center</a>
    </div>
    <p>Copyright © 2026 IMPULSE J. All rights reserved.</p>
  </footer>

  <div class="modal-root" id="modalRoot"></div>
  <div class="context-menu hidden" id="contextMenu"></div>
  <div class="toast-root" id="toastRoot" aria-live="polite"></div>
</body>
</html>
